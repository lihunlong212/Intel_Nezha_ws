# 每架无人机唯一配置入口。修改后需重新启动 launch/dispatch_server。
# 坐标默认单位 cm、时间 s；柱子检测范围单位 m。
drone:
  # 只能是 drone1、drone2、drone3，同时决定本地飞控 Domain 1/2/3 和航线配置。
  device_id: "drone1"
  # drone2/3 接单后收集前机状态并固定前驱的时间窗口。
  coordination_discovery_sec: 10.0

hardware:
  # 高度固定来自 uart_to_stm32 发布的 /height，不再启动 laser_array。
  # true 等待柱子识别；false 直接使用所选航线的 fallback_transit_y_cm。
  use_pillar_detection: false
  # 柱子未在此时间内给出两个有效 Y 坐标时使用 fallback。
  pillar_detection_timeout_sec: 10.0

vision:
  # 抓取和投放统一使用 AprilTag 36h11。
  apriltag_dictionary: "DICT_APRILTAG_36h11"
  # 直接 ros2 launch my_launch demo1.launch.py 时使用；订单启动会覆盖为商品对应 ID。
  default_pickup_apriltag_id: 1

pillar_detection:
  # 雷达/起飞点坐标系，x 向前、y 向左；只保留此矩形范围内的柱子点（m）。
  x_min_m: 0.60
  x_max_m: 3.00
  y_min_m: 1.00
  y_max_m: 1.90

height_filter:
  # /height 合法范围，范围外数据直接丢弃。
  min_cm: 0.0
  max_cm: 200.0
  # 与当前高度相差超过 35cm 时视为跳变，连续稳定 5 帧才接受。
  jump_threshold_cm: 35.0
  required_frames: 5

route:
  map_frame: "map"
  # 历史 TF 名称，不代表激光高度源。
  laser_link_frame: "laser_link"
  output_topic: "/target_position"
  # 0关闭；1抓取指定 AprilTag ID；2投放时接受任意 AprilTag ID。
  vision_mode_topic: "/vision_target_mode"
  # 0暂停；1抓货；2送货；3返航。
  route_stage_command_topic: "/route_stage_command"

  # 航点到达容差：水平距离 cm、偏航 deg、高度 cm。
  position_tolerance_cm: 8.0
  yaw_tolerance_deg: 8.0
  height_tolerance_cm: 5.0

  # 抓取全过程禁用应急收臂；送货、投放和返航仍启用。
  emergency_retract_height_threshold_cm: 50.0
  emergency_retract_z_velocity_threshold_cm_s: 20.0

  # AprilTag 中心误差半径小于阈值并连续满足指定帧数才算对准。
  visual_align_pixel_threshold: 35.0
  visual_align_required_frames: 3
  visual_takeover_timeout_sec: 5.0
  # /fine_data 超过此时间未更新即判为过期，应略大于相机帧周期。
  fine_data_stale_timeout_sec: 0.13

  # 抓取：对准高度、最终下探高度、吸附停留、检查高度与观察窗口。
  pickup_align_altitude_cm: 33.0
  pickup_grab_altitude_cm: 19.0
  pickup_hold_at_grab_sec: 1.0
  pickup_check_altitude_cm: 60.0
  pickup_check_observe_sec: 2.0
  pickup_max_attempts: 3
  # 兼容旧参数；当前成功判定以 pickup_check_observe_sec 内目标 Tag 是否消失为准。
  circle_lost_window_sec: 1.0

  # 投放：AprilTag 对准高度、释放高度及舵机动作等待时间。
  drop_altitude_cm: 42.0
  drop_align_altitude_cm: 50.0
  drop_servo_up_settle_sec: 1.0
  drop_servo_down_settle_sec: 1.0
  drop_servo_retract_delay_sec: 0.5

pid:
  control_frequency: 50.0
  pose_data_timeout_sec: 0.5
  map_frame: "map"
  laser_link_frame: "laser_link"
  kp_xy: 0.8
  ki_xy: 0.0
  kd_xy: 0.2
  kp_yaw: 1.0
  ki_yaw: 0.0
  kd_yaw: 0.2
  kp_z: 1.0
  ki_z: 0.0
  kd_z: 0.2
  # 水平/垂直 cm/s，角速度 deg/s。
  max_linear_velocity: 25.0
  max_angular_velocity: 25.0
  max_vertical_velocity: 25.0
  # AprilTag 像素误差 PID。
  visual_kp_x: 0.08
  visual_ki_x: 0.0
  visual_kd_x: 0.01
  visual_kp_y: 0.08
  visual_ki_y: 0.0
  visual_kd_y: 0.01
  visual_pixel_deadzone: 5.0
  visual_max_xy_velocity: 20.0
  visual_data_timeout_sec: 0.13
  # 任一自主任务失败后永久输出 [vx,vy,vz,yaw]=[0,0,+5,0]，直到进程停止。
  failure_hold_vertical_velocity_cm_s: 5.0

tasks:
  # 调度订单商品名到抓取目标 AprilTag ID。
  huawei:
    target_apriltag_id: 1
  apple:
    target_apriltag_id: 2
  xiaomi:
    target_apriltag_id: 3

# 三套航线完全独立。公共航段后按订单 plan 选择 car1_home 或 delivery_point_1。
# 当前两个分支暂时沿用原投放/返航坐标，可直接在各自 drop_target/return_route 中修改。
# 六组配置互不共享：即使目的地名称相同，drone1/2/3 也可填写完全不同的坐标。
routes:
  drone1:
    fallback_transit_y_cm: 186.0
    post_pickup_climb_altitude_cm: 120.0
    mission_prefix:
      - {x_cm: 0.0, y_cm: 0.0, z_cm: 80.0, yaw_deg: 0.0, type: waypoint, stage: pickup}
      - {x_cm: 0.0, y_cm: 140.0, z_cm: 80.0, yaw_deg: 0.0, type: search, stage: pickup}
      - {x_cm: 0.0, y_cm: transit_y_cm, z_cm: 120.0, yaw_deg: 0.0, type: waypoint, stage: pickup}
      - {x_cm: 120.0, y_cm: transit_y_cm, z_cm: 120.0, yaw_deg: 0.0, type: waypoint, stage: delivery}
    destinations:
      car1_home:
        drop_target: {x_cm: 110.0, y_cm: 345.0, z_cm: 120.0, yaw_deg: 0.0}
        return_route:
          - {x_cm: 0.0, y_cm: 345.0, z_cm: 120.0, yaw_deg: 0.0}
          - {x_cm: 0.0, y_cm: 0.0, z_cm: 120.0, yaw_deg: 0.0}
          - {x_cm: 0.0, y_cm: 0.0, z_cm: 10.0, yaw_deg: 0.0}
      delivery_point_1:
        drop_target: {x_cm: 163.0, y_cm: 70.0, z_cm: 120.0, yaw_deg: 0.0}
        return_route:
          - {x_cm: 163.0, y_cm: 0.0, z_cm: 120.0, yaw_deg: 0.0}
          - {x_cm: 0.0, y_cm: 0.0, z_cm: 120.0, yaw_deg: 0.0}
          - {x_cm: 0.0, y_cm: 0.0, z_cm: 10.0, yaw_deg: 0.0}
  # 首版复制 drone1；比赛前只需在本段修改 drone2 的独立坐标。
  drone2:
    fallback_transit_y_cm: -186.0
    post_pickup_climb_altitude_cm: 120.0
    mission_prefix:
      - {x_cm: 0.0, y_cm: 0.0, z_cm: 80.0, yaw_deg: 0.0, type: waypoint, stage: pickup}
      - {x_cm: 0.0, y_cm: -140.0, z_cm: 80.0, yaw_deg: 0.0, type: search, stage: pickup}
      - {x_cm: 0.0, y_cm: transit_y_cm, z_cm: 124.0, yaw_deg: 0.0, type: waypoint, stage: pickup}
      - {x_cm: 185.0, y_cm: transit_y_cm, z_cm: 124.0, yaw_deg: 0.0, type: waypoint, stage: delivery}
    destinations:
      car1_home:
        drop_target: {x_cm: 177.0, y_cm: -12.0, z_cm: 124.0, yaw_deg: 0.0}
        return_route:
          - {x_cm: 177.0, y_cm: 0.0, z_cm: 124.0, yaw_deg: 0.0}
          - {x_cm: 0.0, y_cm: 0.0, z_cm: 124.0, yaw_deg: 0.0}
          - {x_cm: 0.0, y_cm: 0.0, z_cm: 15.0, yaw_deg: 0.0}
      delivery_point_1:
        drop_target: {x_cm: 217.0, y_cm: -292.0, z_cm: 124.0, yaw_deg: 0.0}
        return_route:
          - {x_cm: 212.0, y_cm: -310.0, z_cm: 124.0, yaw_deg: 0.0}
          - {x_cm: 0.0, y_cm: -310.0, z_cm: 124.0, yaw_deg: 0.0}
          - {x_cm: 0.0, y_cm: 0.0, z_cm: 124.0, yaw_deg: 0.0}
          - {x_cm: 0.0, y_cm: 0.0, z_cm: 15.0, yaw_deg: 0.0}
  # 首版复制 drone1；比赛前只需在本段修改 drone3 的独立坐标。
  drone3:
    fallback_transit_y_cm: 186.0
    post_pickup_climb_altitude_cm: 120.0
    mission_prefix:
      - {x_cm: 0.0, y_cm: 0.0, z_cm: 80.0, yaw_deg: 0.0, type: waypoint, stage: pickup}
      - {x_cm: 0.0, y_cm: 140.0, z_cm: 80.0, yaw_deg: 0.0, type: search, stage: pickup}
      - {x_cm: 0.0, y_cm: transit_y_cm, z_cm: 124.0, yaw_deg: 0.0, type: waypoint, stage: pickup}
      - {x_cm: 235.0, y_cm: transit_y_cm, z_cm: 124.0, yaw_deg: 0.0, type: waypoint, stage: delivery}
    destinations:
      car1_home:
        drop_target: {x_cm: 230.0, y_cm: 345.0, z_cm: 124.0, yaw_deg: 0.0}
        return_route:
          - {x_cm: 0.0, y_cm: 345.0, z_cm: 124.0, yaw_deg: 0.0}
          - {x_cm: 0.0, y_cm: 0.0, z_cm: 124.0, yaw_deg: 0.0}
          - {x_cm: 0.0, y_cm: 0.0, z_cm: 15.0, yaw_deg: 0.0}
      delivery_point_1:
        drop_target: {x_cm: 283.0, y_cm: 70.0, z_cm: 124.0, yaw_deg: 0.0}
        return_route:
          - {x_cm: 283.0, y_cm: 0.0, z_cm: 124.0, yaw_deg: 0.0}
          - {x_cm: 0.0, y_cm: 0.0, z_cm: 124.0, yaw_deg: 0.0}
          - {x_cm: 0.0, y_cm: 0.0, z_cm: 15.0, yaw_deg: 0.0}
